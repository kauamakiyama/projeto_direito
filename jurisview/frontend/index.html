<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decisômetro — Entenda seu processo</title>
  <style>
    :root {
      --bg:              #F5F7FA;
      --surface:         #FFFFFF;
      --primary:         #0D2137;
      --primary-mid:     #1A3A5C;
      --primary-light:   #2A5BA0;
      --accent:          #15803D;
      --accent-light:    #DCFCE7;
      --warn:            #B45309;
      --warn-light:      #FEF3C7;
      --danger:          #DC2626;
      --danger-light:    #FEE2E2;
      --info:            #0369A1;
      --info-light:      #E0F2FE;
      --text:            #0F172A;
      --text-secondary:  #475569;
      --muted:           #94A3B8;
      --border:          #E2E8F0;
      --border-subtle:   #F1F5F9;
      --radius:          14px;
      --radius-sm:       8px;
      --shadow:          0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-md:       0 4px 8px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── MARCA ── */
    .brand {
      text-align: center;
      margin-bottom: 48px;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.03em;
    }
    .brand p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
    }
    .brand-divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 2px;
      margin: 16px auto 0;
    }

    /* ── BUSCA ── */
    .search-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 36px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .search-card label {
      display: block;
      font-weight: 600;
      font-size: .875rem;
      color: var(--primary);
      letter-spacing: .03em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .search-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      font-size: .975rem;
      font-family: "SF Mono", "Fira Code", monospace;
      letter-spacing: .04em;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-mid);
      box-shadow: 0 0 0 3px rgba(26,58,92,.1);
      background: #fff;
    }
    .btn-primary {
      padding: 13px 28px;
      font-size: .95rem;
      font-weight: 600;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--primary-mid); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .55; cursor: wait; }
    .btn-secondary {
      padding: 11px 24px;
      font-size: .9rem;
      font-weight: 600;
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-secondary:hover { background: var(--border-subtle); border-color: var(--primary); }

    .search-footer {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-footer p {
      font-size: .85rem;
      color: var(--muted);
    }
    .tag-cnj {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--info-light);
      color: var(--info);
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .tag-cnj::before {
      content: "";
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--info);
      border-radius: 50%;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 64px 24px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .spinner-wrap { margin-bottom: 24px; }
    .spinner {
      width: 40px; height: 40px;
      margin: 0 auto;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p {
      color: var(--text-secondary);
      font-size: .95rem;
    }
    .loading-dots::after {
      content: "";
      animation: dots 1.4s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ""; }
      33%  { content: "."; }
      66%  { content: ".."; }
      100% { content: "..."; }
    }

    /* ── ERRO ── */
    .error-box {
      background: var(--danger-light);
      border: 1px solid #FECACA;
      border-left: 4px solid var(--danger);
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      color: #7F1D1D;
      font-size: .9rem;
      margin-bottom: 20px;
    }

    /* ── RESULTADO ── */
    .result { animation: fadeUp .4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    /* cabeçalho do processo */
    .proc-header {
      background: linear-gradient(145deg, var(--primary) 0%, var(--primary-mid) 100%);
      color: white;
      padding: 32px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .proc-header::before {
      content: "";
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,.04);
      border-radius: 50%;
    }
    .proc-header::after {
      content: "";
      position: absolute;
      bottom: -40px; right: 60px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,.03);
      border-radius: 50%;
    }
    .proc-num {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: .08em;
      opacity: .95;
      margin-bottom: 4px;
    }
    .proc-badge-grau {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(255,255,255,.15);
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: 20px;
    }
    .proc-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    .proc-meta-item span {
      display: block;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .6;
      margin-bottom: 3px;
    }
    .proc-meta-item strong {
      font-size: .9rem;
      font-weight: 500;
      opacity: .95;
    }

    /* ── BARRA DE PROGRESSO ── */
    .phases-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .phases-title {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .phase-track {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .phase-track::before {
      content: "";
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .phase-track::after {
      content: "";
      position: absolute;
      top: 14px;
      left: 14px;
      width: calc((100% - 28px) * var(--prog, 0));
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #4ADE80);
      border-radius: 2px;
      z-index: 0;
      transition: width .9s cubic-bezier(.4, 0, .2, 1);
    }
    .phase-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .phase-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      color: var(--muted);
      transition: all .3s;
    }
    .phase-item.done .phase-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .phase-item.current .phase-dot {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 0 4px rgba(13,33,55,.12);
    }
    .phase-label {
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
    }
    .phase-item.done .phase-label,
    .phase-item.current .phase-label {
      color: var(--primary);
      font-weight: 600;
    }

    /* ── CARDS MÉTRICAS ── */
    .grid-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .metric-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .metric-card.accent-blue::before  { background: var(--primary); }
    .metric-card.accent-green::before { background: var(--accent); }
    .metric-card.accent-warn::before  { background: var(--warn); }
    .metric-card.accent-info::before  { background: var(--info); }
    .metric-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .metric-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .metric-sub {
      font-size: .8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .metric-sub.italic { font-style: italic; color: var(--muted); margin-top: 4px; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .badge::before {
      content: "";
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .badge-success { background: var(--accent-light); color: var(--accent); }
    .badge-success::before { background: var(--accent); }
    .badge-warn    { background: var(--warn-light);  color: var(--warn);   }
    .badge-warn::before    { background: var(--warn); }
    .badge-danger  { background: var(--danger-light); color: var(--danger); }
    .badge-danger::before  { background: var(--danger); }
    .badge-info    { background: var(--info-light);  color: var(--info);   }
    .badge-info::before    { background: var(--info); }
    .badge-neutral { background: var(--border-subtle); color: var(--text-secondary); }
    .badge-neutral::before { background: var(--muted); }

    /* ── SEÇÕES ── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      letter-spacing: -.01em;
    }

    /* ── MOVIMENTOS ── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .mov-item {
      display: flex;
      gap: 18px;
      padding-bottom: 24px;
      position: relative;
    }
    .mov-item:last-child { padding-bottom: 0; }
    .mov-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 24px;
    }
    .mov-circle {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 2px var(--border);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .mov-item.importancia-alta .mov-circle   { background: var(--primary); box-shadow: 0 0 0 2px rgba(13,33,55,.2); }
    .mov-item.importancia-media .mov-circle  { background: var(--warn);    box-shadow: 0 0 0 2px rgba(180,83,9,.2); }
    .mov-item.importancia-baixa .mov-circle  { background: var(--muted);   box-shadow: 0 0 0 2px rgba(148,163,184,.2); }
    .mov-connector {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin: 4px 0;
      min-height: 16px;
    }
    .mov-item:last-child .mov-connector { display: none; }
    .mov-content { flex: 1; padding-top: 0; }
    .mov-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .mov-date {
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .02em;
    }
    .mov-translated {
      font-size: .95rem;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .mov-original {
      font-size: .82rem;
      color: var(--muted);
      background: var(--border-subtle);
      border-left: 2px solid var(--border);
      padding: 8px 12px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic;
    }

    /* ── ANÁLISE JURÍDICA ── */
    .exito-bar-wrap { margin-bottom: 20px; }
    .exito-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: .8rem;
      color: var(--text-secondary);
    }
    .exito-bar {
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .exito-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #22C55E);
      border-radius: 999px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }

    .analise-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .analise-grid { grid-template-columns: 1fr; } }

    .analise-bloco-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .item-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .item-list li {
      display: flex;
      gap: 10px;
      font-size: .88rem;
      color: var(--text-secondary);
      line-height: 1.45;
    }
    .item-list li .icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .icon-pos { background: var(--accent-light); color: var(--accent); }
    .icon-neg { background: var(--danger-light); color: var(--danger); }
    .icon-neu { background: var(--info-light);   color: var(--info); }

    .disclaimer {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-left: 3px solid var(--warn);
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      color: #78350F;
      font-size: .84rem;
      line-height: 1.5;
    }

    /* ── CUSTOS ── */
    .custos-table { width: 100%; border-collapse: collapse; }
    .custos-table td {
      padding: 13px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: .9rem;
      vertical-align: top;
    }
    .custos-table tr:last-child td { border-bottom: none; }
    .custos-table td:first-child {
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      width: 36%;
      padding-right: 16px;
      padding-top: 15px;
    }
    .custos-table td:last-child { color: var(--text-secondary); }

    /* ── PRÓXIMOS PASSOS ── */
    .steps-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .steps-list li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      font-size: .9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: .7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── ALERTAS ── */
    .alertas-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .alertas-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: .88rem;
      color: #7C2D12;
      line-height: 1.5;
    }
    .alerta-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--danger-light);
      color: var(--danger);
      font-size: .65rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ── RODAPÉ RESULTADO ── */
    .result-footer {
      text-align: center;
      padding: 32px 0 0;
    }
    .result-footer p {
      margin-top: 16px;
      font-size: .8rem;
      color: var(--muted);
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }
    .result-footer strong { color: var(--text-secondary); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- MARCA -->
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 3L4 7v5c0 5 3.5 9.74 8 11 4.5-1.26 8-6 8-11V7L12 3z"/>
        </svg>
      </div>
      <h1>Decisômetro</h1>
    </div>
    <p>Entenda seu processo jurídico em linguagem simples</p>
    <div class="brand-divider"></div>
  </div>

  <!-- TELA 1: BUSCA -->
  <div id="tela-busca" class="search-card">
    <label for="numero">Número do processo (CNJ)</label>
    <div class="search-row">
      <input id="numero" type="text" placeholder="0000000-00.0000.0.00.0000" autocomplete="off" spellcheck="false" />
      <button class="btn-primary" id="btn-consultar" onclick="consultarProcesso()">Consultar</button>
    </div>
    <div class="search-footer">
      <p>Processo do Juizado Especial Cível, explicado sem juridiquês.</p>
      <span class="tag-cnj">Base oficial CNJ — DataJud</span>
    </div>
  </div>

  <!-- TELA 2: LOADING -->
  <div id="tela-loading" class="loading hidden">
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <p><span id="loading-text">Consultando base do CNJ</span><span class="loading-dots"></span></p>
  </div>

  <!-- TELA 3: ERRO -->
  <div id="tela-erro" class="error-box hidden"></div>

  <!-- TELA 4: RESULTADO -->
  <div id="tela-resultado" class="result hidden"></div>

</div>
<script>
const API_URL = "http://localhost:5000/analisar";

const FASES = ["Distribuição","Citação","Conciliação","Instrução","Sentença","Recurso","Encerrado"];
const LOADING_TEXTS = ["Consultando base do CNJ","Analisando movimentações","Preparando seu relatório"];

let loadingInterval = null;
const inputNumero = document.getElementById("numero");

function aplicarMascaraCNJ(valor) {
  const d = valor.replace(/\D/g, "").slice(0, 20);
  if (d.length <= 7)  return d;
  if (d.length <= 9)  return d.slice(0,7) + "-" + d.slice(7);
  if (d.length <= 13) return d.slice(0,7) + "-" + d.slice(7,9) + "." + d.slice(9);
  if (d.length <= 14) return d.slice(0,7) + "-" + d.slice(7,9) + "." + d.slice(9,13) + "." + d.slice(13);
  if (d.length <= 16) return d.slice(0,7) + "-" + d.slice(7,9) + "." + d.slice(9,13) + "." + d.slice(13,14) + "." + d.slice(14);
  return d.slice(0,7) + "-" + d.slice(7,9) + "." + d.slice(9,13) + "." + d.slice(13,14) + "." + d.slice(14,16) + "." + d.slice(16);
}

inputNumero.addEventListener("input", e => {
  const pos = e.target.selectionStart;
  const ant = e.target.value;
  const fmt = aplicarMascaraCNJ(ant);
  e.target.value = fmt;
  const diff = fmt.length - ant.length;
  e.target.setSelectionRange(pos + diff, pos + diff);
});
inputNumero.addEventListener("keydown", e => { if (e.key === "Enter") consultarProcesso(); });

function mostrarLoading() {
  document.getElementById("tela-busca").classList.add("hidden");
  document.getElementById("tela-erro").classList.add("hidden");
  document.getElementById("tela-resultado").classList.add("hidden");
  document.getElementById("tela-loading").classList.remove("hidden");
  let i = 0;
  loadingInterval = setInterval(() => {
    i = (i + 1) % LOADING_TEXTS.length;
    document.getElementById("loading-text").textContent = LOADING_TEXTS[i];
  }, 1800);
}
function esconderLoading() {
  document.getElementById("tela-loading").classList.add("hidden");
  if (loadingInterval) clearInterval(loadingInterval);
}
function mostrarErro(msg) {
  esconderLoading();
  document.getElementById("tela-busca").classList.remove("hidden");
  const box = document.getElementById("tela-erro");
  box.textContent = msg;
  box.classList.remove("hidden");
}

async function consultarProcesso() {
  const num = inputNumero.value.trim();
  if (!num) { mostrarErro("Informe o número do processo."); return; }
  mostrarLoading();
  try {
    const r = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({numero_processo: num}),
    });
    const data = await r.json();
    if (!r.ok) { mostrarErro(data.erro || "Erro desconhecido."); return; }
    esconderLoading();
    renderizarResultado(data);
  } catch {
    mostrarErro("Não foi possível conectar ao servidor. O backend está rodando em localhost:5000?");
  }
}

function calcularProgressoFase(nomeFase, emRecurso) {
  const n = (nomeFase || "").toLowerCase();
  if (n.includes("encerr") || n.includes("trânsito") || n.includes("transito") || n.includes("julgado")) return 7;
  if (emRecurso || n.includes("recurso") || n.includes("apel") || n.includes("turma") || n.includes("câmara") || n.includes("camara")) return 6;
  if (n.includes("senten") || n.includes("decisão") || n.includes("acórdão") || n.includes("acordao")) return 5;
  if (n.includes("instru") || n.includes("audiência") || n.includes("audiencia") || n.includes("prova")) return 4;
  if (n.includes("concili")) return 3;
  if (n.includes("citaç") || n.includes("citac") || n.includes("intim")) return 2;
  return 1;
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Remove emojis de qualquer string
function semEmoji(s) {
  if (!s) return "";
  return String(s).replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{2300}-\u{23FF}]|[\uD800-\uDBFF][\uDC00-\uDFFF]/gu, "").trim();
}

function extrairPercentual(texto) {
  if (!texto) return 0;
  const m = String(texto).match(/(\d{1,3})\s*%/g);
  if (!m) return 0;
  const nums = m.map(x => parseInt(x));
  return Math.round(nums.reduce((a,b)=>a+b,0)/nums.length);
}

function badgeExito(t) {
  const p = extrairPercentual(t);
  if (p >= 70) return "badge-success";
  if (p >= 50) return "badge-warn";
  if (p > 0)   return "badge-danger";
  return "badge-neutral";
}

function badgeImportancia(imp) {
  if (imp === "alta")  return "badge-info";
  if (imp === "media") return "badge-neutral";
  return "badge-neutral";
}

function labelImportancia(imp) {
  if (imp === "alta")  return "Relevante";
  if (imp === "media") return "Normal";
  return "Rotina";
}

function renderizarResultado(d) {
  const p  = d.processo;
  const a  = d.analise;
  const movs = (a.traducao_movimentos || []).slice(0, 8);
  const faseIdx = calcularProgressoFase(a.fase_atual?.nome, a.status_recurso?.em_recurso);
  const progressFrac = FASES.length > 1 ? Math.max(0, (faseIdx - 1) / (FASES.length - 1)) : 0;
  const pct = extrairPercentual(a.analise_juridica?.estimativa_exito);

  const fasesHtml = FASES.map((f, i) => {
    const cls = i + 1 < faseIdx ? "done" : i + 1 === faseIdx ? "current" : "";
    const dotContent = i + 1 < faseIdx ? "&#10003;" : i + 1;
    return `<div class="phase-item ${cls}">
      <div class="phase-dot">${dotContent}</div>
      <span class="phase-label">${f}</span>
    </div>`;
  }).join("");

  const movsHtml = movs.length ? movs.map(m => `
    <div class="mov-item importancia-${esc(m.importancia)}">
      <div class="mov-line">
        <div class="mov-circle"></div>
        <div class="mov-connector"></div>
      </div>
      <div class="mov-content">
        <div class="mov-header">
          <span class="mov-date">${esc(m.data)}</span>
          <span class="badge ${badgeImportancia(m.importancia)}">${labelImportancia(m.importancia)}</span>
        </div>
        <div class="mov-translated">${esc(semEmoji(m.traduzido))}</div>
        <div class="mov-original">${esc(m.original)}</div>
      </div>
    </div>`).join("") : "<p style='color:var(--muted);font-size:.9rem'>Sem movimentações disponíveis.</p>";

  const fundamentos = (a.analise_juridica?.fundamentos || []).map(f =>
    `<li><span class="icon icon-neu">i</span>${esc(semEmoji(f))}</li>`).join("");
  const positivos = (a.analise_juridica?.fatores_positivos || []).map(f =>
    `<li><span class="icon icon-pos">+</span>${esc(semEmoji(f))}</li>`).join("");
  const negativos = (a.analise_juridica?.fatores_negativos || []).map(f =>
    `<li><span class="icon icon-neg">-</span>${esc(semEmoji(f))}</li>`).join("");

  const passos = (a.proximos_passos || []).map((s, i) =>
    `<li><span class="step-num">${i+1}</span>${esc(semEmoji(s))}</li>`).join("");

  const alertasHtml = (a.alertas && a.alertas.length) ? `
    <div class="section" style="border-left:3px solid var(--warn);">
      <div class="section-title" style="color:var(--warn);">Alertas importantes</div>
      <ul class="alertas-list">
        ${a.alertas.map(al => `<li><span class="alerta-icon">!</span>${esc(semEmoji(al))}</li>`).join("")}
      </ul>
    </div>` : "";

  const html = `
    <div class="proc-header">
      <div class="proc-num">${esc(p.numero_processo)}</div>
      <div class="proc-badge-grau">Grau ${esc(p.grau || "-")}</div>
      <div class="proc-meta">
        <div class="proc-meta-item"><span>Tribunal</span><strong>${esc(p.tribunal || "-")}</strong></div>
        <div class="proc-meta-item"><span>Órgão Julgador</span><strong>${esc(p.orgao_julgador || "-")}</strong></div>
        <div class="proc-meta-item"><span>Classe</span><strong>${esc(p.classe || "-")}</strong></div>
        <div class="proc-meta-item"><span>Valor da causa</span><strong>${esc(p.valor_causa)}</strong></div>
        <div class="proc-meta-item"><span>Ajuizado em</span><strong>${esc(p.data_ajuizamento)}</strong></div>
      </div>
    </div>

    <div class="phases-card">
      <div class="phases-title">Progresso do processo</div>
      <div class="phase-track" style="--prog:${progressFrac}">${fasesHtml}</div>
    </div>

    <div class="grid-metrics">
      <div class="metric-card accent-blue">
        <div class="metric-label">Tempo decorrido</div>
        <div class="metric-value">${esc(a.estimativa_prazo?.tempo_decorrido || "-")}</div>
        <div class="metric-sub">Estimativa restante: ${esc(a.estimativa_prazo?.estimativa_restante || "-")}</div>
        ${a.estimativa_prazo?.comparativo ? `<div class="metric-sub italic">${esc(semEmoji(a.estimativa_prazo.comparativo))}</div>` : ""}
      </div>
      <div class="metric-card accent-info">
        <div class="metric-label">Fase atual</div>
        <div class="metric-value" style="font-size:1.1rem">${esc(semEmoji(a.fase_atual?.nome || "-"))}</div>
        <div class="metric-sub">${esc(semEmoji(a.fase_atual?.descricao || ""))}</div>
      </div>
      <div class="metric-card ${a.status_recurso?.em_recurso ? 'accent-warn' : 'accent-green'}">
        <div class="metric-label">Status do recurso</div>
        <div class="metric-value" style="font-size:1rem;margin-top:4px">
          <span class="badge ${a.status_recurso?.em_recurso ? 'badge-warn' : 'badge-success'}">
            ${a.status_recurso?.em_recurso ? "Em recurso" : "Sem recurso ativo"}
          </span>
        </div>
        <div class="metric-sub" style="margin-top:10px">${esc(semEmoji(a.status_recurso?.descricao || ""))}</div>
      </div>
      <div class="metric-card ${pct >= 70 ? 'accent-green' : pct >= 50 ? 'accent-warn' : 'accent-blue'}">
        <div class="metric-label">Estimativa de êxito</div>
        <div class="metric-value" style="font-size:1rem;margin-top:4px">
          <span class="badge ${badgeExito(a.analise_juridica?.estimativa_exito)}">
            ${esc(semEmoji(a.analise_juridica?.estimativa_exito || "Não estimado"))}
          </span>
        </div>
        <div class="metric-sub" style="margin-top:10px">Valor estimado: ${esc(a.analise_juridica?.valor_estimado || "-")}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Movimentações traduzidas</div>
      <div class="timeline">${movsHtml}</div>
    </div>

    <div class="section">
      <div class="section-title">Análise jurídica</div>
      ${pct > 0 ? `
        <div class="exito-bar-wrap">
          <div class="exito-bar-label">
            <span>Probabilidade de êxito estimada</span>
            <strong>${pct}%</strong>
          </div>
          <div class="exito-bar"><div class="exito-bar-fill" style="width:${pct}%"></div></div>
        </div>` : ""}
      <div class="analise-grid">
        <div>
          <div class="analise-bloco-title">Fundamentos jurídicos</div>
          <ul class="item-list">${fundamentos}</ul>
        </div>
        <div>
          <div class="analise-bloco-title">Fatores do caso</div>
          <ul class="item-list">${positivos}${negativos}</ul>
        </div>
      </div>
      <div class="disclaimer">${esc(a.analise_juridica?.disclaimer || "")}</div>
    </div>

    <div class="section">
      <div class="section-title">Custos processuais</div>
      <table class="custos-table">
        <tr><td>1ª instância</td><td>${esc(a.custos?.primeira_instancia || "-")}</td></tr>
        <tr><td>Recurso</td><td>${esc(a.custos?.se_houver_recurso || "-")}</td></tr>
        <tr><td>Honorários</td><td>${esc(a.custos?.honorarios || "-")}</td></tr>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Próximos passos esperados</div>
      <ul class="steps-list">${passos}</ul>
    </div>

    ${alertasHtml}

    <div class="result-footer">
      <button class="btn-secondary" onclick="novaConsulta()">Nova consulta</button>
      <p>Dados obtidos da base oficial do CNJ (DataJud). Última atualização: ${new Date().toLocaleDateString("pt-BR")}.<br>
      A base pode ter defasagem de horas/dias. Esta análise é informativa e <strong>não substitui a orientação de um advogado</strong>.</p>
    </div>`;

  const tr = document.getElementById("tela-resultado");
  tr.innerHTML = html;
  tr.classList.remove("hidden");
  document.getElementById("tela-busca").classList.add("hidden");
  document.getElementById("tela-erro").classList.add("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function novaConsulta() {
  document.getElementById("tela-resultado").classList.add("hidden");
  document.getElementById("tela-busca").classList.remove("hidden");
  inputNumero.value = "";
  inputNumero.focus();
}
</script>
</body>
</html>
